name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Notify production server to deploy
        run: |
          # Build the HMAC-SHA256 signature for the webhook payload
          PAYLOAD='{"ref":"refs/heads/main","pusher":{"name":"github-actions"},"after":"${{ github.sha }}"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print "sha256="$2}')

          HTTP_STATUS=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD" \
            https://pettycash.astutehealthcare.co.uk/deploy-webhook)

          echo "Response: $(cat /tmp/webhook_response.txt)"
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "202" ]; then
            echo "Webhook call failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "Deploy triggered successfully on production server"
