name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: npm install --production
        working-directory: /var/www/pettycash.astutehealthcare.co.uk/html/backend

      - name: Build frontend
        run: |
          npm install
          rm -rf dist
          npm run build
        working-directory: /var/www/pettycash.astutehealthcare.co.uk/html/frontend

      - name: Restart backend
        run: pm2 restart pettycash-backend --update-env

      - name: Verify
        run: |
          sleep 2
          pm2 list
          curl -s http://127.0.0.1:5177/ | grep -o 'index-[^"]*\.js' | head -1
          echo "Deploy complete at $(date)"
