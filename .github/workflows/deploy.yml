name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    # Runs directly on the production server — no SSH needed
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm install --production
        working-directory: backend

      - name: Build frontend
        run: |
          npm install
          rm -rf dist
          npm run build
        working-directory: frontend

      - name: Restart backend
        run: pm2 restart pettycash-backend --update-env

      - name: Verify deployment
        run: |
          sleep 2
          pm2 list
          echo "Deploy complete at $(date)"
