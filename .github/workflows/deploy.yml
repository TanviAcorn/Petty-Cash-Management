name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    # Runs directly on the production VM — no SSH or secrets needed
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Install backend dependencies
        run: npm install --production
        working-directory: backend

      - name: Build frontend
        run: |
          npm install
          rm -rf dist
          npm run build
        working-directory: frontend

      - name: Restart backend
        run: pm2 restart pettycash-backend --update-env

      - name: Verify
        run: |
          sleep 2
          pm2 list
          echo "✅ Deploy complete at $(date)"
