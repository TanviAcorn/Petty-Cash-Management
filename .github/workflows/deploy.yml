name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger webhook deploy on production server
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import hmac, hashlib, urllib.request, json, os, sys

          secret = os.environ.get('WEBHOOK_SECRET', '').encode()
          payload = json.dumps({
            "ref": "refs/heads/main",
            "pusher": {"name": "github-actions"},
            "after": "${{ github.sha }}"
          }).encode()

          sig = 'sha256=' + hmac.new(secret, payload, hashlib.sha256).hexdigest()

          req = urllib.request.Request(
            'https://pettycash.astutehealthcare.co.uk/deploy-webhook',
            data=payload,
            headers={
              'Content-Type': 'application/json',
              'X-Hub-Signature-256': sig,
            },
            method='POST'
          )

          try:
            with urllib.request.urlopen(req, timeout=30) as resp:
              body = resp.read().decode()
              print(f'Status: {resp.status}')
              print(f'Response: {body}')
              if resp.status not in (200, 202):
                sys.exit(1)
          except urllib.error.HTTPError as e:
            print(f'HTTP Error: {e.code} {e.reason}')
            print(e.read().decode())
            sys.exit(1)
          except Exception as e:
            print(f'Error: {e}')
            sys.exit(1)

          print('Deploy triggered successfully')
          PYEOF
