name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted

    steps:
      - name: Pull latest code on server
        run: |
          cd /var/www/pettycash.astutehealthcare.co.uk/html
          git pull origin main

      - name: Install backend dependencies
        run: |
          cd /var/www/pettycash.astutehealthcare.co.uk/html/backend
          npm install --production

      - name: Build frontend
        run: |
          cd /var/www/pettycash.astutehealthcare.co.uk/html/frontend
          npm install
          rm -rf dist
          npm run build

      - name: Restart backend
        run: pm2 restart pettycash-backend --update-env

      - name: Verify
        run: |
          sleep 2
          pm2 list
          echo "Deploy complete at $(date)"
